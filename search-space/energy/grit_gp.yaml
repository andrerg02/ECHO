method:  bayes
program: sweep_run_gnn_gp.py
metric:
  goal: minimize
  name: val_loss
parameters:
  gnn_type: 
    values:
      - GNN
  num_layers:
    values:
      - 4
      - 8
      - 16
      - 32
      - 40
  hidden_dim:
    values:
      - 64
      - 128
      - 256
  lr:
    min: 0.00001
    max: 0.001
  weight_decay:
    min: 0.00000001
    max: 0.001
  dropout_prob:
    min: 0.0
    max: 0.5
  grit_num_heads:
    values:
      - 2
  grit_attn_dropout:
    min: 0.0
    max: 0.5
  grit_act:
    values:
      - relu
  conv_layer:
    values:
      - GRIT
  task:
    values:
      - energy
